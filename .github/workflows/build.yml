name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK using official Buildozer Docker image
        run: |
          docker run --rm -v "$(pwd)":/home/user/hostcwd kivy/buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tictactoe-apk
          path: bin/*.apk
